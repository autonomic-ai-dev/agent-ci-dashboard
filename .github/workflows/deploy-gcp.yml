name: Deploy to GCP
on:
  workflow_dispatch:
    inputs:
      artifact_sha:
        description: "Binary checksum from build-backend"
        type: string
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: rust-binaries

      - name: Make binaries executable
        run: chmod +x github-ingestor insights-api

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Compute Engine
        run: |
          gcloud compute scp \
            github-ingestor insights-api \
            "${{ secrets.GCP_INSTANCE }}:/usr/local/bin/" \
            --zone="${{ secrets.GCP_ZONE }}" \
            --ssh-key-expire-after=10m

          gcloud compute ssh "${{ secrets.GCP_INSTANCE }}" \
            --zone="${{ secrets.GCP_ZONE }}" \
            --ssh-key-expire-after=10m \
            --command="
              sudo systemctl daemon-reload
              sudo systemctl restart github-ingestor insights-api
              sleep 3
              curl -sf http://localhost:3001/health && echo ' ingestor OK' || echo ' ingestor FAIL'
              curl -sf http://localhost:3002/health && echo ' api OK' || echo ' api FAIL'
            "
