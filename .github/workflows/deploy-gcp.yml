name: Deploy to GCP
on:
  workflow_dispatch:
    inputs:
      artifact_sha:
        description: "Backend artifact checksum"
        type: string
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Download binaries
        uses: actions/download-artifact@v7
        with:
          name: rust-binaries
          path: /tmp/rust-binaries

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Compute Engine
        run: |
          gcloud compute scp \
            /tmp/rust-binaries/github-ingestor \
            /tmp/rust-binaries/insights-api \
            "${{ secrets.GCP_INSTANCE }}:~/deploy-${{ inputs.artifact_sha }}/" \
            --zone="${{ secrets.GCP_ZONE }}" \
            --ssh-key-expire-after=10m

          gcloud compute ssh "${{ secrets.GCP_INSTANCE }}" \
            --zone="${{ secrets.GCP_ZONE }}" \
            --ssh-key-expire-after=10m \
            --command="
              sudo systemctl stop github-ingestor insights-api
              sudo cp ~/deploy-${{ inputs.artifact_sha }}/github-ingestor /usr/local/bin/
              sudo cp ~/deploy-${{ inputs.artifact_sha }}/insights-api /usr/local/bin/
              sudo systemctl daemon-reload
              sudo systemctl start github-ingestor insights-api
              echo '=== Health ==='
              sleep 2
              curl -sf http://localhost:3001/health && echo ' ingestor OK' || echo ' ingestor FAIL'
            "
