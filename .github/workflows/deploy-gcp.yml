name: Deploy to GCP
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag from GHCR"
        type: string
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/agent-ci

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Compute Engine
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.image_tag }}"

          gcloud compute ssh "${{ secrets.GCP_INSTANCE }}" \
            --zone="${{ secrets.GCP_ZONE }}" \
            --ssh-key-expire-after=10m \
            --command="
              echo '=== Login GHCR ==='
          echo ${{ secrets.GHCR_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

              echo '=== Pull image ==='
              docker pull $IMAGE

              echo '=== Stop old containers ==='
              docker stop github-ingestor insights-api 2>/dev/null || true
              docker rm github-ingestor insights-api 2>/dev/null || true

              echo '=== Run ingestor ==='
              docker run -d \
                --name github-ingestor \
                --restart unless-stopped \
                -p 3001:3001 \
                -e DATABASE_URL \
                -e GITHUB_APP_ID \
                -e GITHUB_APP_PRIVATE_KEY \
                -e GITHUB_APP_INSTALLATION_ID \
                -e GITHUB_WEBHOOK_SECRET \
                -e GITHUB_ORG_NAME \
                --entrypoint /usr/local/bin/github-ingestor \
                $IMAGE

              echo '=== Run API ==='
              docker run -d \
                --name insights-api \
                --restart unless-stopped \
                -p 3002:3002 \
                -e DATABASE_URL \
                -e GITHUB_APP_ID \
                -e GITHUB_APP_PRIVATE_KEY \
                -e GITHUB_APP_INSTALLATION_ID \
                -e GITHUB_WEBHOOK_SECRET \
                -e GITHUB_ORG_NAME \
                --entrypoint /usr/local/bin/insights-api \
                $IMAGE

              echo '=== Health ==='
              sleep 3
              curl -sf http://localhost:3001/health && echo ' ingestor OK' || echo ' ingestor FAIL'
              curl -sf http://localhost:3002/health && echo ' api OK' || echo ' api FAIL'
            "
