name: Build Frontend
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache bun
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}

      - name: Install & build
        run: |
          bun install --frozen-lockfile
          bun run gen:proto
          bun run check
          bun run build

      - name: Upload build
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: build/
          retention-days: 1
