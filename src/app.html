<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Primary SEO -->
		<meta name="description" content="Mission Control for Autonomic AI Agents — real-time CI/CD dashboard with push notifications, log viewer, and GitHub Actions integration." />
		<meta name="keywords" content="CI/CD, GitHub Actions, dashboard, SvelteKit, Vercel, autonomous AI, DevOps, pipeline monitoring" />
		<meta name="author" content="Autonomic AI Dev" />
		<meta name="robots" content="index, follow" />

		<!-- Open Graph / Social -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Agent CI Dashboard — Mission Control for AI Agents" />
		<meta property="og:description" content="Real-time CI/CD pipeline monitoring, push notifications, and log viewer for the Autonomic AI agent ecosystem." />
		<meta property="og:image" content="/pwa-512x512.png" />
		<meta property="og:site_name" content="Agent CI Dashboard" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Agent CI Dashboard — Mission Control for AI Agents" />
		<meta name="twitter:description" content="Real-time CI/CD pipeline monitoring, push notifications, and log viewer for the Autonomic AI agent ecosystem." />
		<meta name="twitter:image" content="/pwa-512x512.png" />

		<!-- PWA -->
		<meta name="theme-color" content="#4f46e5" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Agent CI" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
		<link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />
		<link rel="manifest" href="/manifest.webmanifest" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
